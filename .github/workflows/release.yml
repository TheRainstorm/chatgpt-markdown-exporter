name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Package extension
        run: bash scripts/package-extension.sh

      - name: Read package metadata
        id: package
        run: |
          archive="$(ls dist/*.zip | head -n 1)"
          version="$(python -c 'import json; print(json.load(open("chatgpt-markdown-exporter/manifest.json"))["version"])')"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        if: github.ref_type == 'tag'
        run: |
          expected="${{ steps.package.outputs.tag }}"
          if [ "${GITHUB_REF_NAME}" != "$expected" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${expected}."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.package.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${{ steps.package.outputs.archive }}" --clobber
          else
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              gh release create "$tag" "${{ steps.package.outputs.archive }}" \
                --title "$tag" \
                --generate-notes
            else
              gh release create "$tag" "${{ steps.package.outputs.archive }}" \
                --title "$tag" \
                --target "$GITHUB_SHA" \
                --generate-notes
            fi
          fi
